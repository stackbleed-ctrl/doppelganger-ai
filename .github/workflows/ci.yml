name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install deps
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check src/

      - name: Type check
        run: mypy src/ --ignore-missing-imports || true

      - name: Tests
        run: pytest tests/ -v --cov=src --cov-report=term-missing
        env:
          XAI_API_KEY: "test_key_not_used_in_unit_tests"

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build core image
        run: docker build -f docker/Dockerfile.core -t doppelganger-core:ci .

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t doppelganger-frontend:ci ./frontend
